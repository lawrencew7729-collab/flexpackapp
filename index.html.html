<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexPack Project Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hidden-tab { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 overflow-hidden h-screen flex flex-col md:flex-row text-sm">

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-100 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg w-full max-w-sm text-center">
            <div class="flex justify-center mb-4">
                <img src="https://i.imgur.com/cHHfOpw.png" alt="FlexPack Logo" class="h-12 w-auto object-contain" onerror="this.style.display='none'; document.getElementById('text-logo-login').style.display='block';">
                <div id="text-logo-login" class="font-extrabold text-3xl hidden"><span class="text-[#00AEEF]">Flex</span><span class="text-gray-400">Pack</span></div>
            </div>
            <p id="auth-title" class="text-slate-500 mb-6 text-xs">System Login</p>
            
            <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-3">
                <input type="text" id="username" required placeholder="Username" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm">
                <input type="password" id="password" required placeholder="Password" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm">
                <button type="submit" id="auth-submit-btn" class="w-full bg-[#00AEEF] hover:bg-[#0095cc] text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm">Login</button>
            </form>

            <div class="mt-4 text-xs text-slate-500">
                <p id="auth-switch-text">New employee? <button onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Register here</button></p>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP INTERFACE (Hidden by default) -->
    <div id="app-screen" class="hidden flex-1 h-full w-full flex-col md:flex-row relative">
        
        <!-- Mobile Top Nav -->
        <div class="md:hidden flex items-center justify-between p-3 bg-white border-b border-slate-200 z-20 shrink-0">
            <img src="https://i.imgur.com/cHHfOpw.png" alt="Logo" class="h-8 w-auto" onerror="this.style.display='none'">
            <button onclick="toggleMobileMenu()" class="p-1.5 -mr-1 text-slate-600 hover:bg-slate-100 rounded-lg">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleMobileMenu()"></div>

        <!-- Sidebar -->
        <div id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 bg-white border-r border-slate-200 flex flex-col shadow-xl md:shadow-none transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shrink-0">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center shrink-0">
                <img src="https://i.imgur.com/cHHfOpw.png" alt="Logo" class="h-8 w-auto">
                <button class="md:hidden p-1 text-slate-500 hover:bg-slate-100 rounded-md" onclick="toggleMobileMenu()">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex-1 py-3 px-2 space-y-1 overflow-y-auto">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors bg-sky-50 text-[#00AEEF]">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Dashboard
                </button>
                <button onclick="switchTab('projects')" id="nav-projects" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors text-slate-600 hover:bg-slate-50">
                    <i data-lucide="briefcase" class="w-4 h-4 mr-2"></i> Projects
                </button>
                <button onclick="switchTab('attention')" id="nav-attention" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors text-slate-600 hover:bg-slate-50">
                    <i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i> Attention Summary
                </button>
                <button onclick="switchTab('report')" id="nav-report" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors text-slate-600 hover:bg-slate-50">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Daily Report
                </button>
                
                <button onclick="switchTab('users')" id="nav-users" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors text-slate-600 hover:bg-slate-50 hidden">
                    <i data-lucide="users" class="w-4 h-4 mr-2"></i> User Mgmt
                </button>
            </div>

            <div class="p-3 border-t border-slate-100 shrink-0">
                <div class="text-[10px] text-slate-500 mb-2 px-1">
                    Logged in as: <strong id="logged-user-name" class="text-slate-800 capitalize"></strong>
                </div>
                <button onclick="logout()" class="w-full flex items-center px-2 py-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors text-xs font-medium">
                    <i data-lucide="log-out" class="w-3 h-3 mr-2"></i> Logout
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 overflow-y-auto relative w-full">
            <div class="p-4 md:p-6 max-w-6xl mx-auto w-full">
                
                <!-- TAB: DASHBOARD -->
                <div id="tab-dashboard" class="tab-content space-y-4">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">System Overview</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div onclick="switchTab('projects')" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 border-t-4 border-t-[#00AEEF] cursor-pointer hover:shadow-md transition-all">
                            <div class="text-slate-500 text-xs font-medium mb-1">Total Projects</div>
                            <div id="stat-total-projects" class="text-3xl font-bold text-slate-800">0</div>
                        </div>
                        <div id="admin-stat-users" onclick="switchTab('users')" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 border-t-4 border-t-slate-400 cursor-pointer hover:shadow-md transition-all hidden">
                            <div class="text-slate-500 text-xs font-medium mb-1">Pending Users</div>
                            <div id="stat-pending-users" class="text-3xl font-bold text-slate-600">0</div>
                        </div>
                    </div>
                    <div class="pt-3 border-t border-slate-200">
                        <h3 class="text-base font-bold text-slate-800 mb-3">Total Attention</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button onclick="switchTab('attention')" class="bg-yellow-50 border border-yellow-200 p-4 rounded-xl text-left hover:bg-yellow-100 hover:border-yellow-300 transition-all flex flex-col items-start shadow-sm w-full">
                                <div class="flex items-center text-yellow-800 text-xs font-semibold mb-1"><i data-lucide="clock" class="w-4 h-4 mr-1.5"></i> Due in ≤ 7 Days</div>
                                <div id="stat-yellow" class="text-3xl font-bold text-yellow-600">0</div>
                            </button>
                            <button onclick="switchTab('attention')" class="bg-red-50 border border-red-200 p-4 rounded-xl text-left hover:bg-red-100 hover:border-red-300 transition-all flex flex-col items-start shadow-sm w-full">
                                <div class="flex items-center text-red-800 text-xs font-semibold mb-1"><i data-lucide="alert-circle" class="w-4 h-4 mr-1.5"></i> Overdue</div>
                                <div id="stat-red" class="text-3xl font-bold text-red-600">0</div>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- TAB: ATTENTION SUMMARY -->
                <div id="tab-attention" class="tab-content max-w-3xl hidden-tab">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-slate-800">Attention Summary</h2>
                        <span id="attention-count" class="bg-slate-200 text-slate-700 py-0.5 px-2 rounded-full text-[10px] font-bold uppercase tracking-wider">0 Issues</span>
                    </div>
                    <div id="attention-list" class="space-y-3">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- TAB: USERS (Admin) -->
                <div id="tab-users" class="tab-content hidden-tab">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">User Management</h2>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="overflow-x-auto w-full">
                            <table class="w-full text-left text-xs min-w-[500px]">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="px-4 py-3 font-semibold text-slate-600">Username</th>
                                        <th class="px-4 py-3 font-semibold text-slate-600">Role</th>
                                        <th class="px-4 py-3 font-semibold text-slate-600">Status</th>
                                        <th class="px-4 py-3 font-semibold text-slate-600 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body" class="divide-y divide-slate-100">
                                    <!-- Rendered by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- TAB: PROJECTS -->
                <div id="tab-projects" class="tab-content hidden-tab w-full">
                    
                    <!-- View 1: Project List -->
                    <div id="project-list-view">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-3">
                            <h2 class="text-lg font-bold text-slate-800">Projects</h2>
                            <form onsubmit="createProject(event)" class="flex w-full md:w-auto gap-2">
                                <input type="text" id="new-project-name" placeholder="New Project Name..." class="px-3 py-1.5 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none flex-1 min-w-[180px] text-sm">
                                <button type="submit" class="bg-[#00AEEF] text-white px-3 py-1.5 rounded-lg hover:bg-[#0095cc] flex items-center justify-center font-medium shadow-sm text-sm shrink-0">
                                    <i data-lucide="plus" class="w-4 h-4 md:mr-1"></i><span class="hidden md:inline">Create</span>
                                </button>
                            </form>
                        </div>
                        <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            <!-- Rendered by JS -->
                        </div>
                    </div>

                    <!-- View 2: Project Detail (Timeline) -->
                    <div id="project-detail-view" class="hidden">
                        <div class="flex items-center mb-4">
                            <button onclick="closeProjectDetail()" class="mr-3 p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600 shrink-0">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <div class="flex-1 overflow-hidden min-w-0">
                                <h2 id="detail-project-name" class="text-base md:text-lg font-bold text-slate-800 truncate"></h2>
                                <p class="text-xs text-slate-500">Timeline & Tasks</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 divide-y divide-slate-100 flex flex-col">
                            
                            <div id="task-list" class="flex flex-col">
                                <!-- Rendered by JS -->
                            </div>

                            <!-- Add Task Form Footer -->
                            <div class="p-3 bg-slate-50 border-t border-slate-200 space-y-2 shrink-0">
                                <textarea id="new-task-desc" rows="2" placeholder="New Task Description..." class="w-full px-2.5 py-1.5 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none resize-y text-sm"></textarea>
                                <div class="flex gap-2 w-full">
                                    <div class="flex-1 min-w-0">
                                        <label class="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">Start Date</label>
                                        <input type="date" id="new-task-start" class="w-full px-2 py-1 border rounded text-[10px] text-slate-600 outline-none focus:border-[#00AEEF]">
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <label class="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">End Date</label>
                                        <input type="date" id="new-task-end" class="w-full px-2 py-1 border rounded text-[10px] text-slate-600 outline-none focus:border-[#00AEEF]">
                                    </div>
                                </div>
                                <button onclick="addTask()" class="bg-[#00AEEF] text-white px-3 py-1.5 rounded-lg hover:bg-[#0095cc] w-full font-medium shadow-sm text-xs mt-1">
                                    + Add Task
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TAB: REPORT -->
                <div id="tab-report" class="tab-content max-w-xl hidden-tab">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">Daily Activity Report</h2>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 md:p-6">
                        <form onsubmit="submitReport(event)" class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1">Project Selector</label>
                                <select id="report-project-select" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none bg-white text-sm">
                                    <!-- Rendered by JS -->
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1">Location</label>
                                <input type="text" required placeholder="e.g. Factory Site A" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1">Work Done Today</label>
                                <textarea required rows="3" placeholder="Describe progress..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm"></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 mb-1">Photo Evidence</label>
                                <input type="file" accept="image/*" class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white text-sm">
                            </div>
                            <button type="submit" class="w-full flex justify-center items-center bg-[#00AEEF] hover:bg-[#0095cc] text-white font-bold py-2 px-4 rounded-lg shadow-sm text-sm">
                                <i data-lucide="send" class="w-4 h-4 mr-2"></i> Submit to Boss
                            </button>
                        </form>
                    </div>
                </div>

            </div>
            
            <!-- Toast Message -->
            <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-xl flex items-center z-50 text-sm transition-opacity duration-300 opacity-0 pointer-events-none">
                <i data-lucide="check-circle-2" class="w-4 h-4 mr-2 text-green-400"></i>
                <span id="toast-msg"></span>
            </div>
        </div>
    </div>

    <!-- MAIN APP LOGIC -->
    <script>
        // Data State
        let users = [{ username: 'admin', password: '8888', role: 'admin', status: 'approved' }];
        let projects = []; 
        let tasks = [];
        
        let currentUser = null;
        let activeTabId = 'dashboard';
        let authMode = 'login'; // login | register
        let selectedProjectId = null;
        let expandedTasks = new Set();

        // Utilities
        const getDiffDays = (dueDateStr) => {
            if (!dueDateStr) return 999;
            const due = new Date(dueDateStr);
            due.setHours(0, 0, 0, 0);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            return Math.ceil((due.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
        };

        const showToast = (msg) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => { toast.classList.add('opacity-0'); }, 3000);
        };

        const toggleMobileMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        // Authentication
        const toggleAuthMode = () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'System Login' : 'Employee Registration';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Login' : 'Register Account';
            document.getElementById('auth-switch-text').innerHTML = authMode === 'login' 
                ? 'New employee? <button type="button" onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Register here</button>'
                : 'Already registered? <button type="button" onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Back to Login</button>';
        };

        const handleAuth = (e) => {
            e.preventDefault();
            const un = document.getElementById('username').value.trim();
            const pw = document.getElementById('password').value.trim();
            
            if (authMode === 'login') {
                const user = users.find(u => u.username === un && u.password === pw);
                if (!user) { alert("Invalid username or password."); return; }
                if (user.status !== 'approved') { alert("Your account is pending approval by Admin."); return; }
                
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
                
                document.getElementById('logged-user-name').innerText = `${user.username} (${user.role})`;
                if(user.role === 'admin') {
                    document.getElementById('nav-users').classList.remove('hidden');
                    document.getElementById('admin-stat-users').classList.remove('hidden');
                } else {
                    document.getElementById('nav-users').classList.add('hidden');
                    document.getElementById('admin-stat-users').classList.add('hidden');
                }
                
                renderAll();
            } else {
                if (users.find(u => u.username === un)) { alert("Username already exists."); return; }
                users.push({ username: un, password: pw, role: 'employee', status: 'pending' });
                alert("Registration successful. Please wait for Admin to approve.");
                toggleAuthMode();
                document.getElementById('auth-form').reset();
            }
        };

        const logout = () => {
            currentUser = null;
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('flex');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('auth-form').reset();
        };

        const approveUser = (un) => {
            users = users.map(u => u.username === un ? { ...u, status: 'approved' } : u);
            showToast(`User ${un} approved.`);
            renderUsers();
            renderDashboard();
        };

        // Navigation
        const switchTab = (tabId) => {
            activeTabId = tabId;
            selectedProjectId = null;
            
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-tab'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden-tab');
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.className = 'nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors text-slate-600 hover:bg-slate-50';
            });
            document.getElementById(`nav-${tabId}`).className = 'nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium transition-colors bg-sky-50 text-[#00AEEF]';
            
            const sidebar = document.getElementById('sidebar');
            if(!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) toggleMobileMenu();
            
            renderAll();
        };

        // Project & Task Logic
        const createProject = (e) => {
            e.preventDefault();
            const input = document.getElementById('new-project-name');
            const name = input.value.trim();
            if(!name) return;
            projects.push({ id: Date.now(), name, createdBy: currentUser.username });
            input.value = '';
            showToast("Project created.");
            renderProjectsList();
            renderDashboard();
        };

        const openProjectDetail = (pid) => {
            selectedProjectId = pid;
            document.getElementById('project-list-view').classList.add('hidden');
            document.getElementById('project-detail-view').classList.remove('hidden');
            document.getElementById('detail-project-name').innerText = projects.find(p => p.id === pid).name;
            renderTasks();
        };

        const closeProjectDetail = () => {
            selectedProjectId = null;
            document.getElementById('project-detail-view').classList.add('hidden');
            document.getElementById('project-list-view').classList.remove('hidden');
            renderProjectsList();
        };

        const addTask = () => {
            const name = document.getElementById('new-task-desc').value;
            const start = document.getElementById('new-task-start').value;
            const due = document.getElementById('new-task-end').value;
            if(!name || !start || !due) { alert("Please fill all fields."); return; }
            
            tasks.push({ id: Date.now(), projectId: selectedProjectId, name, startDate: start, dueDate: due, isComplete: false, remark: '' });
            document.getElementById('new-task-desc').value = '';
            document.getElementById('new-task-start').value = '';
            document.getElementById('new-task-end').value = '';
            renderTasks();
            renderDashboard();
        };

        const toggleComplete = (tid) => {
            tasks = tasks.map(t => t.id === tid ? { ...t, isComplete: !t.isComplete } : t);
            showToast("Status updated");
            renderTasks();
            renderDashboard();
        };

        const updateRemark = (tid, val) => {
            tasks = tasks.map(t => t.id === tid ? { ...t, remark: val } : t);
        };

        const toggleExpand = (tid) => {
            if(expandedTasks.has(tid)) expandedTasks.delete(tid);
            else expandedTasks.add(tid);
            renderTasks();
        };

        const submitReport = (e) => {
            e.preventDefault();
            showToast("Report sent to Admin successfully!");
            e.target.reset();
        };

        // Render Functions
        const renderDashboard = () => {
            if(activeTabId !== 'dashboard') return;
            document.getElementById('stat-total-projects').innerText = projects.length;
            document.getElementById('stat-pending-users').innerText = users.filter(u => u.status === 'pending').length;
            
            let red = 0, yellow = 0;
            tasks.forEach(t => {
                if(!t.isComplete) {
                    const days = getDiffDays(t.dueDate);
                    if(days < 0) red++;
                    else if(days <= 7) yellow++;
                }
            });
            document.getElementById('stat-yellow').innerText = yellow;
            document.getElementById('stat-red').innerText = red;
        };

        const renderProjectsList = () => {
            if(activeTabId !== 'projects' || selectedProjectId) return;
            const grid = document.getElementById('projects-grid');
            if(projects.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-slate-300 text-slate-500 text-sm">No projects created yet.</div>`;
                return;
            }
            grid.innerHTML = projects.map(p => `
                <div onclick="openProjectDetail(${p.id})" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md cursor-pointer transition-all border-l-4 border-l-[#00AEEF]">
                    <h3 class="font-bold text-sm mb-1 text-slate-800 break-words">${p.name}</h3>
                    <p class="text-[10px] text-slate-500">Created by: ${p.createdBy}</p>
                    <p class="text-[10px] text-slate-500 mt-0.5">Tasks: ${tasks.filter(t => t.projectId === p.id).length}</p>
                </div>
            `).join('');
        };

        const renderTasks = () => {
            if(activeTabId !== 'projects' || !selectedProjectId) return;
            const list = document.getElementById('task-list');
            const pTasks = tasks.filter(t => t.projectId === selectedProjectId);
            
            if(pTasks.length === 0) {
                list.innerHTML = `<div class="p-6 text-center text-slate-500 bg-slate-50/50 text-xs">Timeline is blank. Add tasks below.</div>`;
                return;
            }

            list.innerHTML = pTasks.map(t => {
                const diffDays = getDiffDays(t.dueDate);
                let statusHtml = '';
                if(t.isComplete) statusHtml = `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold border bg-green-100 text-green-800 border-green-200"><i data-lucide="check-circle-2" class="w-3 h-3 mr-0.5"></i> Completed</span>`;
                else if(diffDays < 0) statusHtml = `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold border bg-red-100 text-red-800 border-red-200"><i data-lucide="alert-circle" class="w-3 h-3 mr-0.5"></i> Overdue</span>`;
                else if(diffDays <= 7) statusHtml = `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold border bg-yellow-100 text-yellow-800 border-yellow-200"><i data-lucide="clock" class="w-3 h-3 mr-0.5"></i> Due in ${diffDays}d</span>`;
                else statusHtml = `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold border bg-gray-100 text-gray-800 border-gray-200"><i data-lucide="clock" class="w-3 h-3 mr-0.5"></i> On Track</span>`;

                const isExpanded = expandedTasks.has(t.id);
                const adminInputClass = currentUser.role === 'admin' ? 'bg-sky-50 border-sky-200 focus:ring-1 focus:ring-sky-400 text-sky-900' : 'bg-transparent border-transparent text-slate-500 px-0';
                
                return `
                <div class="p-3 hover:bg-slate-50 transition-colors w-full">
                    <div class="flex items-start gap-2 w-full">
                        <input type="checkbox" ${t.isComplete ? 'checked' : ''} onchange="toggleComplete(${t.id})" class="mt-0.5 h-4 w-4 rounded border-gray-300 text-[#00AEEF] cursor-pointer shrink-0">
                        <div class="flex-1 space-y-1.5 min-w-0">
                            <div>
                                <div onclick="toggleExpand(${t.id})" class="text-sm font-bold text-slate-800 cursor-pointer whitespace-pre-wrap ${!isExpanded ? 'line-clamp-4' : ''} ${t.isComplete ? 'line-through text-slate-400' : ''}">${t.name}</div>
                                <div class="text-[10px] text-slate-500 mt-0.5 font-medium">${t.startDate || 'N/A'} — ${t.dueDate || 'N/A'}</div>
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <div class="w-fit">${statusHtml}</div>
                                <input type="text" value="${t.remark}" onchange="updateRemark(${t.id}, this.value)" ${currentUser.role !== 'admin' ? 'disabled placeholder="No remarks"' : 'placeholder="Admin remarks (type here)..."'} class="w-full px-2 py-1 border rounded text-[10px] transition-colors ${adminInputClass}">
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons(); // Re-init icons for dynamic content
        };

        const renderAttention = () => {
            if(activeTabId !== 'attention') return;
            const att = tasks.filter(t => !t.isComplete && getDiffDays(t.dueDate) <= 7);
            att.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            document.getElementById('attention-count').innerText = `${att.length} Issues`;
            
            const list = document.getElementById('attention-list');
            if(att.length === 0) {
                list.innerHTML = `<div class="text-center py-8 bg-white rounded-xl border border-slate-200 text-slate-500 shadow-sm text-sm"><i data-lucide="check-circle-2" class="w-8 h-8 mx-auto text-green-400 mb-2"></i>Great job! No overdue tasks.</div>`;
            } else {
                list.innerHTML = att.map(t => {
                    const p = projects.find(proj => proj.id === t.projectId);
                    const isOver = getDiffDays(t.dueDate) < 0;
                    return `
                    <div class="bg-white rounded-xl shadow-sm border-l-4 p-4 ${isOver ? 'border-l-red-500 border-red-100' : 'border-l-yellow-400 border-yellow-100'} border-t border-b border-r">
                        <div class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Project: <span class="text-slate-800">${p?.name||'Unknown'}</span></div>
                        <div class="text-sm font-bold text-slate-800 mb-2 whitespace-pre-wrap">${t.name}</div>
                        <span class="inline-flex items-center px-2 py-1 rounded-md text-[10px] font-bold ${isOver ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-800'}">
                            <i data-lucide="${isOver ? 'alert-circle' : 'clock'}" class="w-3 h-3 mr-1"></i> ${isOver ? 'OVERDUE: ' : 'DEADLINE: '} ${t.dueDate}
                        </span>
                    </div>`;
                }).join('');
            }
            lucide.createIcons();
        };

        const renderUsers = () => {
            if(activeTabId !== 'users' || currentUser?.role !== 'admin') return;
            document.getElementById('users-table-body').innerHTML = users.map(u => `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-3 font-medium break-all">${u.username}</td>
                    <td class="px-4 py-3 capitalize">${u.role}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${u.status === 'approved' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${u.status}</span></td>
                    <td class="px-4 py-3 text-right">
                        ${u.status === 'pending' ? `<button onclick="approveUser('${u.username}')" class="bg-[#00AEEF] text-white px-3 py-1.5 rounded-lg text-xs hover:bg-[#0095cc]">Approve</button>` : ''}
                    </td>
                </tr>
            `).join('');
        };

        const renderReportSelect = () => {
            if(activeTabId !== 'report') return;
            const sel = document.getElementById('report-project-select');
            sel.innerHTML = '<option value="">-- Select Project --</option>' + projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        };

        const renderAll = () => {
            renderDashboard();
            renderProjectsList();
            renderTasks();
            renderAttention();
            renderUsers();
            renderReportSelect();
            lucide.createIcons();
        };

        // Init icons on load
        lucide.createIcons();
    </script>
</body>
</html>
