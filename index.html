<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexPack Project Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 overflow-hidden h-screen flex flex-col md:flex-row">

    <!-- Loading Spinner -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 flex items-center justify-center z-50 hidden">
        <div class="flex flex-col items-center gap-3">
            <svg class="animate-spin h-8 w-8 text-[#00AEEF]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm text-slate-500" id="loading-text">Loading...</span>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-xl flex items-center z-50 text-sm transition-opacity duration-300 opacity-0 pointer-events-none">
        <span id="toast-icon-wrap" class="w-4 h-4 mr-2 flex items-center"></span>
        <span id="toast-msg">Success</span>
    </div>

    <!-- ================= 1. LOGIN / REGISTER VIEW ================= -->
    <div id="auth-view" class="absolute inset-0 flex items-center justify-center bg-slate-100 p-4 z-50">
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg w-full max-w-sm text-center">
            <div class="flex justify-center mb-4">
                <img src="https://i.imgur.com/cHHfOpw.png" alt="FlexPack Logo" class="h-12 w-auto object-contain" onerror="this.onerror=null; this.outerHTML='<div class=\\'font-extrabold text-3xl\\'><span class=\\'text-[#00AEEF]\\'>Flex</span><span class=\\'text-gray-400\\'>Pack</span></div>'"/>
            </div>
            <p id="auth-title" class="text-slate-500 mb-6 text-xs">System Login</p>

            <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-3">
                <input type="text" id="auth-user" required placeholder="Username" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm"/>
                <input type="password" id="auth-pass" required placeholder="Password" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-[#00AEEF] outline-none text-sm"/>
                <button type="submit" id="auth-submit-btn" class="w-full bg-[#00AEEF] hover:bg-[#0095cc] text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm">
                    Login
                </button>
            </form>

            <div class="mt-4 text-xs text-slate-500">
                <p id="auth-toggle-text">New employee? <button type="button" onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Register here</button></p>
            </div>
        </div>
    </div>

    <!-- ================= 2. MAIN APP VIEW ================= -->
    <div id="main-app-view" class="hidden flex-1 h-full flex flex-col md:flex-row w-full">

        <!-- Mobile Header -->
        <div class="md:hidden flex items-center justify-between p-3 bg-white border-b border-slate-200 z-20">
            <img src="https://i.imgur.com/cHHfOpw.png" alt="FlexPack Logo" class="h-8 w-auto object-contain" onerror="this.onerror=null; this.outerHTML='<div class=\\'font-extrabold text-lg\\'><span class=\\'text-[#00AEEF]\\'>Flex</span><span class=\\'text-gray-400\\'>Pack</span></div>'"/>
            <button onclick="toggleMobileMenu(true)" class="p-1.5 -mr-1 text-slate-600 hover:bg-slate-100 rounded-lg">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity" onclick="toggleMobileMenu(false)"></div>

        <!-- Sidebar -->
        <div id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 bg-white border-r border-slate-200 flex flex-col shadow-xl md:shadow-sm transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <img src="https://i.imgur.com/cHHfOpw.png" alt="FlexPack Logo" class="h-8 w-auto object-contain" onerror="this.onerror=null; this.outerHTML='<div class=\\'font-extrabold text-xl\\'><span class=\\'text-[#00AEEF]\\'>Flex</span><span class=\\'text-gray-400\\'>Pack</span></div>'"/>
                <button class="md:hidden p-1 text-slate-500 hover:bg-slate-100 rounded-md" onclick="toggleMobileMenu(false)">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex-1 py-3 px-2 space-y-1 overflow-y-auto">
                <button onclick="switchTab('dashboard')" id="tab-btn-dashboard" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Dashboard
                </button>
                <button onclick="switchTab('projects')" id="tab-btn-projects" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    <i data-lucide="briefcase" class="w-4 h-4 mr-2"></i> Projects
                </button>
                <button onclick="switchTab('attention')" id="tab-btn-attention" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    <i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i> Attention Summary
                </button>
                <button onclick="switchTab('report')" id="tab-btn-report" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Daily Report
                </button>
                <button onclick="switchTab('photos')" id="tab-btn-photos" class="nav-btn w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    <i data-lucide="camera" class="w-4 h-4 mr-2"></i> Photos
                </button>
                <button onclick="switchTab('users')" id="tab-btn-users" class="nav-btn role-admin-only w-full flex items-center px-3 py-2 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors hidden">
                    <i data-lucide="users" class="w-4 h-4 mr-2"></i> User Mgmt
                </button>
            </div>

            <div class="p-3 border-t border-slate-100">
                <div class="text-[10px] text-slate-500 mb-2 px-1">
                    Logged in as: <strong id="display-username" class="text-slate-800 capitalize"></strong>
                </div>
                <button onclick="doLogout()" class="w-full flex items-center px-2 py-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors text-xs font-medium">
                    <i data-lucide="log-out" class="w-3 h-3 mr-2"></i> Logout
                </button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto relative">
            <div class="p-4 md:p-6 max-w-6xl mx-auto" id="content-container">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script>
        // ============================================
        // SUPABASE CLIENT
        // ============================================
        const SUPABASE_URL = 'https://utexuyhtfitsmpxebonj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_dIdfukjl8XMhcZGIj1p_pQ_KMvbdWgJ';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // STATE
        // ============================================
        let currentUser = null;
        let authMode = 'login';
        let activeTab = 'dashboard';
        let selectedProjectId = null;
        let expandedTaskId = null;

        // ============================================
        // UTILS
        // ============================================
        function getDiffDays(dueDateStr) {
            if (!dueDateStr) return 999;
            const due = new Date(dueDateStr);
            due.setHours(0, 0, 0, 0);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            return Math.ceil((due.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
        }

        // ============================================
        // TOAST — uses inline SVG (avoid Lucide race)
        // ============================================
        const TOAST_ICONS = {
            success: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-green-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            error: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-red-400"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        };

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const wrap = document.getElementById('toast-icon-wrap');
            const msg = document.getElementById('toast-msg');
            if (!toast || !msg) return;
            msg.innerText = message;
            if (wrap) wrap.innerHTML = isError ? TOAST_ICONS.error : TOAST_ICONS.success;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function getTaskStatusObj(task) {
            if (task.is_complete) return { text: "Completed", color: "bg-green-100 text-green-800 border-green-200", icon: "check-circle-2" };
            const diffDays = getDiffDays(task.due_date);
            if (diffDays < 0) return { text: "Overdue", color: "bg-red-100 text-red-800 border-red-200", icon: "alert-circle" };
            if (diffDays <= 7) return { text: `Due in ${diffDays}d`, color: "bg-yellow-100 text-yellow-800 border-yellow-200", icon: "clock" };
            return { text: "On Track", color: "bg-gray-100 text-gray-800 border-gray-200", icon: "clock" };
        }

        function toggleMobileMenu(show) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if(show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function showLoading(text = 'Loading...') {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            overlay.classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // ============================================
        // SUPABASE HELPERS
        // ============================================
        async function supabaseQuery(table, options = {}) {
            const { select = '*', eq, order, limit, single } = options;
            let query = sb.from(table).select(select);
            if (eq) for (const [k, v] of Object.entries(eq)) query = query.eq(k, v);
            if (order) query = query.order(order.by, { ascending: order.asc !== false });
            if (limit) query = query.limit(limit);
            if (single) query = query.single();
            const { data, error } = await query;
            if (error) throw error;
            return data;
        }

        async function supabaseInsert(table, records) {
            const { data, error } = await sb.from(table).insert(records).select();
            if (error) throw error;
            return data;
        }

        async function supabaseUpdate(table, match, updates) {
            let query = sb.from(table).update(updates);
            for (const [k, v] of Object.entries(match)) query = query.eq(k, v);
            const { data, error } = await query.select();
            if (error) throw error;
            return data;
        }

        async function supabaseDelete(table, match) {
            let query = sb.from(table).delete();
            for (const [k, v] of Object.entries(match)) query = query.eq(k, v);
            const { data, error } = await query;
            if (error) throw error;
            return data;
        }

        // ============================================
        // AUTH
        // ============================================
        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'System Login' : 'Employee Registration';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Login' : 'Register Account';
            document.getElementById('auth-toggle-text').innerHTML = authMode === 'login'
                ? 'New employee? <button type="button" onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Register here</button>'
                : 'Already registered? <button type="button" onclick="toggleAuthMode()" class="text-[#00AEEF] font-semibold">Back to Login</button>';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if (!u || !p) return alert('Please fill in all fields.');

            showLoading(authMode === 'login' ? 'Signing in...' : 'Registering...');

            try {
                if (authMode === 'login') {
                    const { data: users, error } = await sb
                        .from('users')
                        .select('*')
                        .eq('username', u)
                        .eq('password', p)
                        .limit(1);

                    if (error) throw error;

                    if (!users || users.length === 0) {
                        hideLoading();
                        return alert('Invalid username or password.');
                    }

                    const user = users[0];
                    if (user.status !== 'approved') {
                        hideLoading();
                        return alert('Your account is pending approval by Admin.');
                    }

                    currentUser = user;
                    document.getElementById('auth-user').value = '';
                    document.getElementById('auth-pass').value = '';
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('main-app-view').classList.remove('hidden');
                    document.getElementById('display-username').innerText = `${currentUser.username} (${currentUser.role})`;

                    document.querySelectorAll('.role-admin-only').forEach(el => {
                        if (currentUser.role === 'admin') el.classList.remove('hidden');
                        else el.classList.add('hidden');
                    });

                    hideLoading();
                    await switchTab('dashboard');
                } else {
                    // Register
                    const { data: existing } = await sb.from('users').select('id').eq('username', u).limit(1);
                    if (existing && existing.length > 0) {
                        hideLoading();
                        return alert('Username already exists.');
                    }

                    const { error } = await sb.from('users').insert([{
                        username: u,
                        password: p,
                        role: 'employee',
                        status: 'pending'
                    }]);

                    if (error) throw error;

                    hideLoading();
                    alert('Registration successful. Please wait for Admin to approve.');
                    toggleAuthMode();
                }
            } catch (err) {
                hideLoading();
                alert('Error: ' + err.message);
            }
        }

        async function doLogout() {
            currentUser = null;
            document.getElementById('main-app-view').classList.add('hidden');
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('content-container').innerHTML = '';
        }

        // ============================================
        // NAVIGATION & RENDERING
        // ============================================
        async function switchTab(tab) {
            if (tab === 'users' && (!currentUser || currentUser.role !== 'admin')) return;
            activeTab = tab;
            selectedProjectId = null;
            toggleMobileMenu(false);

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-sky-50', 'text-[#00AEEF]');
                btn.classList.add('text-slate-600');
            });
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-sky-50', 'text-[#00AEEF]');
                activeBtn.classList.remove('text-slate-600');
            }

            await renderContent();
        }

        async function renderContent() {
            const container = document.getElementById('content-container');
            showLoading('Loading...');

            try {
                let html = '';
                if (activeTab === 'dashboard') html = await getDashboardHTML();
                else if (activeTab === 'projects') html = await getProjectsHTML();
                else if (activeTab === 'attention') html = await getAttentionHTML();
                else if (activeTab === 'report') html = await getReportHTML();
                else if (activeTab === 'photos') html = await getPhotosHTML();
                else if (activeTab === 'users') html = await getUsersHTML();

                container.innerHTML = html;
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = `<div class="p-8 text-center text-red-500"><i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-2"></i><p>Error loading: ${err.message}</p></div>`;
                lucide.createIcons();
            }

            hideLoading();
        }

        // ============================================
        // DASHBOARD
        // ============================================
        async function getDashboardHTML() {
            const [projects, tasks, allUsers] = await Promise.all([
                sb.from('projects').select('id', { count: 'exact', head: true }),
                sb.from('tasks').select('id, is_complete, due_date'),
                sb.from('users').select('id, status').eq('status', 'pending')
            ]);

            const projectCount = projects.count || 0;
            const allTasks = tasks.data || [];
            const pendingUsers = allUsers.data ? allUsers.data.length : 0;

            let redCount = 0, yellowCount = 0;
            allTasks.forEach(t => {
                if (!t.is_complete) {
                    const days = getDiffDays(t.due_date);
                    if (days < 0) redCount++;
                    else if (days <= 7) yellowCount++;
                }
            });

            return `
                <div class="space-y-4 animate-fade-in">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">System Overview</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div onclick="switchTab('projects')" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 border-t-4 border-t-[#00AEEF] cursor-pointer hover:shadow-md transition-all">
                            <div class="text-slate-500 text-xs font-medium mb-1">Total Projects</div>
                            <div class="text-3xl font-bold text-slate-800">${projectCount}</div>
                        </div>
                        ${currentUser.role === 'admin' ? `
                        <div onclick="switchTab('users')" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 border-t-4 border-t-slate-400 cursor-pointer hover:shadow-md transition-all">
                            <div class="text-slate-500 text-xs font-medium mb-1">Pending Users</div>
                            <div class="text-3xl font-bold text-slate-600">${pendingUsers}</div>
                        </div>` : ''}
                    </div>
                    <div class="pt-3 border-t border-slate-200">
                        <h3 class="text-base font-bold text-slate-800 mb-3">Total Attention</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button onclick="switchTab('attention')" class="bg-yellow-50 border border-yellow-200 p-4 rounded-xl text-left hover:bg-yellow-100 transition-all flex flex-col items-start shadow-sm w-full">
                                <div class="flex items-center text-yellow-800 text-xs font-semibold mb-1">
                                    <i data-lucide="clock" class="w-4 h-4 mr-1.5"></i> Due in ≤ 7 Days
                                </div>
                                <div class="text-3xl font-bold text-yellow-600">${yellowCount}</div>
                            </button>
                            <button onclick="switchTab('attention')" class="bg-red-50 border border-red-200 p-4 rounded-xl text-left hover:bg-red-100 transition-all flex flex-col items-start shadow-sm w-full">
                                <div class="flex items-center text-red-800 text-xs font-semibold mb-1">
                                    <i data-lucide="alert-circle" class="w-4 h-4 mr-1.5"></i> Overdue
                                </div>
                                <div class="text-3xl font-bold text-red-600">${redCount}</div>
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        // ============================================
        // PROJECTS
        // ============================================
        async function getProjectsHTML() {
            const { data: projects } = await sb.from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            let listHTML = '';
            if (!projects || projects.length === 0) {
                listHTML = `<div class="text-center py-12 text-slate-400"><i data-lucide="briefcase" class="w-12 h-12 mx-auto mb-3 opacity-50"></i><p>No projects yet. Create your first project!</p></div>`;
            } else {
                for (const p of projects) {
                    const { count: taskCount } = await sb.from('tasks')
                        .select('id', { count: 'exact', head: true })
                        .eq('project_id', p.id);

                    listHTML += `
                        <div onclick="selectProject(${p.id})" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 hover:shadow-md transition-all cursor-pointer">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h4 class="font-semibold text-slate-800">${p.name}</h4>
                                    <p class="text-xs text-slate-500 mt-0.5 line-clamp-4">${p.description || 'No description'}</p>
                                </div>
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${
                                    p.status === 'active' ? 'bg-green-100 text-green-700' :
                                    p.status === 'completed' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'
                                }">${p.status}</span>
                            </div>
                            <div class="flex items-center gap-3 mt-3 text-xs text-slate-400">
                                <span><i data-lucide="list-todo" class="w-3 h-3 inline mr-0.5"></i> ${taskCount} tasks</span>
                                <span><i data-lucide="user" class="w-3 h-3 inline mr-0.5"></i> ${p.created_by}</span>
                                <span><i data-lucide="calendar" class="w-3 h-3 inline mr-0.5"></i> ${formatDate(p.created_at)}</span>
                            </div>
                        </div>`;
                }
            }

            return `
                <div class="space-y-4 animate-fade-in">
                    <div class="flex items-center justify-between">
                        <h2 class="text-lg font-bold text-slate-800">Projects</h2>
                        <button onclick="showProjectModal()" class="bg-[#00AEEF] hover:bg-[#0095cc] text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">
                            <i data-lucide="plus" class="w-3 h-3 inline mr-0.5"></i> New Project
                        </button>
                    </div>
                    <div class="space-y-3">
                        ${listHTML}
                    </div>
                </div>

                <!-- New Project Modal -->
                <div id="project-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden p-4" onclick="if(event.target===this)closeProjectModal()">
                    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onclick="event.stopPropagation()">

            showLoading();
            try {
                await supabaseInsert('tasks', [{

        async function getAttentionHTML() {
            const { data: tasks } = await sb.from('tasks')
                .select('*, projects!inner(name)')
                .eq('is_complete', false)
                .order('due_date', { ascending: true });

            const attentionTasks = (tasks || []).filter(t => getDiffDays(t.due_date) <= 7);

            let listHTML = '';
            if (attentionTasks.length === 0) {
                listHTML = `<div class="text-center py-12 text-slate-400"><i data-lucide="smile" class="w-12 h-12 mx-auto mb-3 opacity-50"></i><p>No tasks needing attention. Great job!</p></div>`;
            } else {
                attentionTasks.forEach(t => {
                    const days = getDiffDays(t.due_date);
                    const isOverdue = days < 0;
                    listHTML += `
                        <div class="bg-white border ${isOverdue ? 'border-red-200 bg-red-50/30' : 'border-yellow-200 bg-yellow-50/30'} rounded-xl p-3">
                            <div class="flex items-start justify-between gap-2">
                                <div class="min-w-0 flex-1">

                                    isOverdue ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'
                                }">${isOverdue ? `${Math.abs(days)}d overdue` : `Due in ${days}d`}</span>
                            </div>
                            ${t.due_date ? `<p class="text-[10px] text-slate-400 mt-1">${formatDate(t.due_date)}</p>` : ''}
                        </div>`;

            return `
                <div class="space-y-4 animate-fade-in">
                    <h2 class="text-lg font-bold text-slate-800">Attention Summary</h2>
                    <div class="flex gap-2 text-xs text-slate-500 mb-2">
                        <span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded-full">≤ 7 Days: ${attentionTasks.filter(t => getDiffDays(t.due_date) >= 0).length}</span>
                        <span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full">Overdue: ${attentionTasks.filter(t => getDiffDays(t.due_date) < 0).length}</span>
                    </div>
                    <div class="space-y-2">${listHTML}</div>
                </div>`;
        }

        // Preview on file select
        document.addEventListener('change', function(e) {
            if (e.target.id === 'photo-file') {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('preview-img').src = ev.target.result;
                        document.getElementById('upload-preview').classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        async function uploadPhoto(e) {
            e.preventDefault();
            const fileInput = document.getElementById('photo-file');
            const projectId = document.getElementById('photo-project').value;
            const file = fileInput.files[0];
            if (!file) return;

            submitBtn = document.getElementById('upload-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Uploading...';

            showLoading('Uploading photo...');
            try {
                // Upload to Supabase Storage
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await sb.storage
                    .from('flexpack-photos')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (uploadError) throw uploadError;

                // Get public URL
                const { data: { publicUrl } } = sb.storage
                    .from('flexpack-photos')
                    .getPublicUrl(fileName);

                // Save metadata to photos table
                await supabaseInsert('photos', [{
                    url: publicUrl,
                    filename: file.name,
                    project_id: projectId || null,
                    uploaded_by: currentUser.username
                }]);

                closePhotoUploadModal();
                showToast('Photo uploaded!');
                await renderContent();
            } catch (err) {
                showToast('Upload error: ' + err.message, true);
            }
            submitBtn.disabled = false;
            submitBtn.innerText = 'Upload';
            hideLoading();
        }

            return `
                <div class="space-y-4 animate-fade-in">
                    <h2 class="text-lg font-bold text-slate-800">User Management</h2>
                    <div class="space-y-2">${listHTML}</div>
                </div>`;
        }

        async function approveUser(userId) {
            try {
                await supabaseUpdate('users', { id: userId }, { status: 'approved' });
                showToast('User approved!');
                await renderContent();
            } catch (err) {
                showToast('Error: ' + err.message, true);
            }
        }

        async function rejectUser(userId) {
            if (!confirm('Reject and delete this user?')) return;
            try {
                await supabaseDelete('users', { id: userId });
                showToast('User rejected');
                await renderContent();
            } catch (err) {
                showToast('Error: ' + err.message, true);
            }
        }
    </script>
</body>
</html>
